<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무인양품(MUJI) 온라인스토어</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  </head>
  <body>
    <div class="header-icons">
      <button class="icon search" aria-label="검색">
        <img src="img/search.svg" alt="검색" />
      </button>
      <button class="icon barcode" aria-label="바코드">
        <img src="img/barcode.svg" alt="바코드" />
      </button>
      <button class="icon login" aria-label="로그인">
        <img src="img/login.svg" alt="로그인" />
      </button>
      <button class="icon user" aria-label="마이페이지">
        <img src="img/mypage.svg" alt="마이페이지" />
      </button>
      <button class="icon cart" aria-label="장바구니">
        <img src="img/cart.svg" alt="장바구니" />
      </button>
    </div>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">
          <a href="index.html">
            <img src="img/muji_longlogo.svg" alt="무인양품 로고" />
          </a>
        </h1>
      </div>
    </header>
    </nav>
<section class="main-menu">
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="img/banner.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner2.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner3.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner4.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner5.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner6.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner7.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner8.jpg" alt="main" /></div>
      <div class="swiper-slide"><img src="img/banner9.jpg" alt="main" /></div>
    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>    
  </div>
  <section class="main-menu-row">
    <div class="content-row">
      <button>최근 본 상품</button>
    </div>
    <section class="main-photo">
      <div class="main-photo-title">회원님을 위한 맞춤 추천</div>
      <marquee class="main-photo-marquee" behavior="scroll" direction="left" scrollamount="6">
        <img src="img/main_photo.jpg" alt="맞춤추천사진1"/>
        <img src="img/main_photo2.jpg" alt="맞춤추천사진2"/>
        <img src="img/main_photo3.jpg" alt="맞춤추천사진3"/>
        <img src="img/main_photo4.jpg" alt="맞춤추천사진4"/>
        <img src="img/main_photo5.jpg" alt="맞춤추천사진5"/>
        <img src="img/main_photo6.jpg" alt="맞춤추천사진6"/>
        <img src="img/main_photo7.jpg" alt="맞춤추천사진7"/>
        <img src="img/main_photo8.jpg" alt="맞춤추천사진8"/>
      </marquee>
    </section>
  </div>
  
  <script>
  new Swiper('.swiper', {
    loop: true,
    pagination: { el: '.swiper-pagination', clickable: true },
    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
    slidesPerView: 1,
    spaceBetween: 0,
  });
</script>
  </body>
</html>
